<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Warning - Critical Threat Detected</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: "Courier New", monospace; overflow: hidden; height: 100vh; }
        .background { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: repeating-linear-gradient(0deg, rgba(0, 255, 0, 0.03) 0px, rgba(0, 255, 0, 0.03) 1px, transparent 1px, transparent 2px), #000; pointer-events: none; z-index: 1; }
        .window { position: fixed; background: #c0c0c0; border: 2px solid; border-color: #dfdfdf #808080 #808080 #dfdfdf; box-shadow: 1px 1px 0 #000, 2px 2px 0 rgba(0,0,0,0.5); min-width: 300px; z-index: 100; }
        .titlebar { background: linear-gradient(90deg, #000080, #1084d7); color: #fff; padding: 2px 2px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; font-size: 12px; cursor: move; user-select: none; }
        .titletext { flex: 1; padding: 2px 4px; }
        .close { background: #c0c0c0; border: 1px solid; border-color: #dfdfdf #808080 #808080 #dfdfdf; width: 18px; height: 14px; font-size: 10px; cursor: pointer; color: #000; font-weight: bold; }
        .content { padding: 10px; background: #c0c0c0; text-align: center; }
        .alert-icon { font-size: 48px; margin-bottom: 10px; }
        .alert-title { font-weight: bold; color: #ff3333; font-size: 14px; margin-bottom: 10px; }
        .alert-text { text-align: left; color: #000; font-size: 12px; line-height: 1.6; margin-bottom: 10px; }
        .critical { color: #ff3333; font-weight: bold; }
        .high { color: #ff6600; font-weight: bold; }
        .progress { width: 100%; height: 20px; background: #dfdfdf; border: 1px solid #808080; margin: 5px 0; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, #ff3333, #ff6600); animation: move 2s infinite; }
        @keyframes move { 0%, 100% { width: 0%; } 50% { width: 100%; } }
        .btn-action { background: #c0c0c0; border: 2px solid; border-color: #dfdfdf #808080 #808080 #dfdfdf; padding: 4px 12px; cursor: pointer; color: #000; font-weight: bold; }
        .mcafee .titlebar { background: linear-gradient(90deg, #8b0000, #ff1a1a); }
        .kaspersky .titlebar { background: linear-gradient(90deg, #006400, #00aa00); }
        .norton .titlebar { background: linear-gradient(90deg, #1a1a6b, #4040ff); }
        .avast .titlebar { background: linear-gradient(90deg, #ff6600, #ff9933); }
        .defender .titlebar { background: linear-gradient(90deg, #0078d4, #0096ff); }
        .terminal { width: 400px; }
        .terminal-bar { background: #000080 !important; }
        .terminal-content { background: #000; color: #00ff00; padding: 10px; font-size: 12px; max-height: 150px; }
    </style>
</head>
<body>
    <div class="background"></div>
    <div id="container"></div>

    <script>
        let dragging = null;
        let offset = {x: 0, y: 0};
        
        const templates = [
            { name: 'McAfee Total Protection', icon: '⚠️', title: 'CRITICAL THREAT DETECTED', threat: 'Trojan.GenericKD.4521', details: 'File: C:\\Windows\\System32\\drivers\\etc\\hosts', class: 'mcafee' },
            { name: 'Kaspersky Internet Security', icon: '🛡️', title: 'MALWARE DETECTED', threat: 'Backdoor.Win32.Poison', details: 'Location: C:\\Program Files\\RealPlayer\\RealPlayer.exe', class: 'kaspersky' },
            { name: 'Norton AntiVirus', icon: '🚨', title: 'VIRUS WARNING!', threat: 'Win32.Zotob.A!generic', details: 'File: C:\\Windows\\svchost.exe', class: 'norton' },
            { name: 'Avast Free Antivirus', icon: '⛔', title: 'RANSOMWARE DETECTED', threat: 'Ransom.Wannacry', details: 'Status: BLOCKED', class: 'avast' },
            { name: 'Windows Defender Security Center', icon: '⚠️', title: 'SPYWARE DETECTED', threat: 'PUA:Win32/Adware.Bundler', details: 'File: C:\\Users\\Admin\\AppData\\Local\\Temp\\infected.exe', class: 'defender' }
        ];
        
        function createWindow(template) {
            const randomX = Math.random() * (window.innerWidth - 350);
            const randomY = Math.random() * (window.innerHeight - 250);
            
            const div = document.createElement('div');
            div.className = `window ${template.class}`;
            div.style.top = randomY + 'px';
            div.style.left = randomX + 'px';
            div.innerHTML = `
                <div class="titlebar"><div class="titletext">${template.name}</div><button class="close">&times;</button></div>
                <div class="content"><div class="alert-icon">${template.icon}</div><div class="alert-title">${template.title}</div><div class="alert-text"><strong>${template.threat}</strong><br>${template.details}<br><div class="progress"><div class="progress-bar"></div></div></div><button class="btn-action">ACTION</button></div>
            `;
            
            document.getElementById('container').appendChild(div);
            
            div.querySelector('.close').addEventListener('click', (e) => {
                e.stopPropagation();
                div.remove();
            });
            
            div.querySelector('.titlebar').addEventListener('mousedown', (e) => {
                dragging = div;
                let rect = div.getBoundingClientRect();
                offset.x = e.clientX - rect.left;
                offset.y = e.clientY - rect.top;
                div.style.zIndex = 10000;
            });
        }
        
        document.addEventListener('mousemove', (e) => {
            if (!dragging) return;
            dragging.style.left = (e.clientX - offset.x) + 'px';
            dragging.style.top = (e.clientY - offset.y) + 'px';
        });
        
        document.addEventListener('mouseup', () => {
            dragging = null;
        });
        
        // Create initial 5 windows
        templates.forEach(t => createWindow(t));
        
        // Spawn 2-4 new windows every 200ms
        setInterval(() => {
            const count = Math.floor(Math.random() * 3) + 2;
            for (let i = 0; i < count; i++) {
                createWindow(templates[Math.floor(Math.random() * templates.length)]);
            }
            
            // Keep max 60 windows on screen
            const windows = document.querySelectorAll('.window');
            if (windows.length > 60) {
                for (let i = 0; i < windows.length - 60; i++) {
                    windows[i].remove();
                }
            }
        }, 200);
    </script>
</body>
</html>
